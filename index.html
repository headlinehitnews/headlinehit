<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEADLINE HIT</title>
  <meta name="description" content="The news, unspun.">
  <meta property="og:title" content="Headline Hit">
  <meta property="og:description" content="The news, unspun.">
  <meta property="og:image" content="https://headlinehit.com/headlinehit.svg">
  <meta property="og:url" content="https://headlinehit.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #ffffff;
      font-family: Arial, sans-serif;
      color: #000000;
    }

    /* ── Header ── */
    header {
      background: #ffffff;
      text-align: center;
      padding: 16px 20px;
      border-bottom: 4px solid #cc0000;
    }

    header h1 {
      font-size: 2.8em;
      letter-spacing: 6px;
      text-transform: uppercase;
      font-family: Georgia, serif;
      color: #000000;
    }

    header p.tagline {
      font-size: 1em;
      color: #444444;
      margin-top: 6px;
    }

    /* ── Info bar ── */
    .bar {
      background: #111111;
      padding: 7px 0;
      font-size: 0.92em;
      font-family: Arial, sans-serif;
    }

    .bar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .bar-date {
      color: #ffffff;
      letter-spacing: 0.3px;
    }

    .bar-submit {
      color: #ffffff;
      cursor: pointer;
      font-weight: bold;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-size: 0.9em;
      background: none;
      border: none;
      font-family: Arial, sans-serif;
      padding: 0;
    }

    .bar-submit:hover { text-decoration: underline; opacity: 0.8; }

    /* ── Submission modal ── */
    .submit-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .submit-overlay.open { display: flex; }

    .submit-modal {
      background: #fff;
      border-radius: 6px;
      width: 100%;
      max-width: 500px;
      padding: 28px;
      position: relative;
    }

    .submit-modal h2 {
      font-family: Georgia, serif;
      font-size: 1.3em;
      color: #cc0000;
      margin-bottom: 6px;
    }

    .submit-modal p.sub-desc {
      font-size: 0.85em;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .submit-modal .close-btn {
      position: absolute;
      top: 14px; right: 16px;
      background: none; border: none;
      font-size: 1.4em; cursor: pointer;
      color: #888;
    }

    .submit-field { margin-bottom: 14px; }

    .submit-field label {
      display: block;
      font-size: 0.82em;
      color: #555;
      margin-bottom: 4px;
      font-weight: bold;
    }

    .submit-field input,
    .submit-field textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-size: 0.9em;
      font-family: Arial, sans-serif;
      color: #111;
    }

    .submit-field input:focus,
    .submit-field textarea:focus {
      outline: 2px solid #cc0000;
      border-color: transparent;
    }

    .submit-field textarea { resize: vertical; min-height: 80px; }

    .submit-btn {
      width: 100%;
      padding: 10px;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 3px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      font-family: Arial, sans-serif;
      margin-top: 4px;
    }

    .submit-btn:hover { background: #aa0000; }
    .submit-btn:disabled { opacity: 0.5; cursor: default; }

    .submit-success {
      text-align: center;
      padding: 20px 0;
      display: none;
    }

    .submit-success .check { font-size: 2.5em; margin-bottom: 10px; }
    .submit-success h3 { font-size: 1.1em; color: #111; margin-bottom: 8px; }
    .submit-success p { font-size: 0.85em; color: #666; }

    /* ── Container ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
    }

    /* ── Main two-column layout ── */
    .main-columns {
      display: grid;
      grid-template-columns: 70% 30%;
      gap: 0;
      margin-top: 20px;
      align-items: start;
    }

    /* ── LEFT: Top Stories ── */
    .top-stories-col {
      padding-right: 20px;
      border-right: 2px solid #dddddd;
    }

    /* Hero (index 0) */
    .top-story {
      display: flex;
      flex-direction: column;
      margin-bottom: 16px;
    }

    .img-wrap {
      position: relative;
      display: block;
    }

    .top-story .img-wrap img {
      width: 100%;
      height: 340px;
      object-fit: cover;
      display: block;
    }

    .top-story .no-image {
      width: 100%;
      height: 340px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.85em;
    }

    .top-story a.headline {
      font-size: 1.4em;
      font-weight: bold;
      color: #cc0000;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      text-wrap: balance;
      margin-top: 8px;
      text-align: center;
    }

    .top-story a.headline:hover { text-decoration: underline; }

    /* 2-wide sub-row (indices 1-2) */
    .sub-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 0;
    }

    .sub-card { display: flex; flex-direction: column; }

    .sub-card .img-wrap img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .sub-card .no-image {
      width: 100%;
      height: 200px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.75em;
    }

    .sub-card a.headline {
      font-size: 0.9em;
      font-weight: bold;
      color: #000080;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      text-align: center;
      text-wrap: balance;
      margin-top: 6px;
    }

    .sub-card a.headline:hover { text-decoration: underline; }
    .sub-card a.headline:visited { color: #551a8b; }

    /* 2x4 grid (indices 3-10) */
    .sub-grid-8 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      border-top: 2px solid #cc0000;
      padding: 14px 0 0;
      margin-top: 14px;
    }

    .sub-row-card { display: flex; flex-direction: column; }

    .sub-row-card .img-wrap img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
    }

    .sub-row-card .no-image {
      width: 100%;
      height: 100px;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.7em;
    }

    .sub-row-card a.headline {
      font-size: 0.75em;
      font-weight: bold;
      color: #000080;
      text-decoration: none;
      line-height: 1.3;
      display: block;
      text-align: center;
      text-wrap: balance;
      margin-top: 4px;
    }

    .sub-row-card a.headline:hover { text-decoration: underline; }
    .sub-row-card a.headline:visited { color: #551a8b; }

    /* ── Source overlay on images ── */
    .source-overlay {
      position: absolute;
      bottom: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.82);
      color: #444444;
      font-size: 0.7em;
      font-family: Arial, sans-serif;
      padding: 2px 6px;
      line-height: 1.5;
      pointer-events: none;
      max-width: 80%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── RIGHT: Other Stories ── */
    .other-stories-col {
      padding-left: 18px;
      display: flex;
      flex-direction: column;
    }

    .other-stories-label {
      font-size: 0.7em;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #999999;
      border-bottom: 2px solid #cc0000;
      padding-bottom: 6px;
      margin-bottom: 10px;
    }

    .other-link-item {
      padding: 8px 0;
      border-bottom: 1px solid #eeeeee;
    }

    .other-link-item a {
      font-size: 0.95em;
      color: #000080;
      text-decoration: none;
      display: block;
      line-height: 1.4;
      padding-left: 1.2em;
      text-indent: -1.2em;
    }

    .other-link-item a:hover { text-decoration: underline; }
    .other-link-item a:visited { color: #551a8b; }

    .other-link-source {
      font-size: 0.72em;
      color: #888888;
      margin-top: 2px;
      padding-left: 1.2em;
    }

    .inline-source {
      font-size: 0.82em;
      color: #888888;
      font-weight: normal;
    }

    /* ── Bottom overflow grid ── */
    .bottom-divider {
      border-top: 2px solid #cccccc;
      margin-top: 20px;
      padding-top: 20px;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px 30px;
    }

    .link-item {
      padding-bottom: 10px;
      border-bottom: 1px solid #eeeeee;
    }

    .link-item a {
      font-size: 1.05em;
      color: #000080;
      text-decoration: none;
      display: block;
      padding-left: 1.4em;
      text-indent: -1.4em;
    }

    .link-item a:hover { text-decoration: underline; }
    .link-item a:visited { color: #551a8b; }

    .link-source {
      font-size: 0.78em;
      color: #888888;
      margin-top: 2px;
      padding-left: 1.4em;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: 0.75em;
      color: #888888;
      border-top: 2px solid #000000;
      margin-top: 40px;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      header h1 { font-size: 1.8em; letter-spacing: 3px; }
      header p.tagline { font-size: 0.85em; }

      .main-columns {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .top-stories-col {
        padding-right: 0;
        border-right: none;
        border-bottom: 2px solid #dddddd;
        padding-bottom: 20px;
      }

      .other-stories-col { padding-left: 0; }

      .top-story .img-wrap img,
      .top-story .no-image { height: 220px; }

      .top-story a.headline { font-size: 1.1em; }

      .sub-row-2 { grid-template-columns: 1fr 1fr; }

      .sub-card .img-wrap img,
      .sub-card .no-image { height: 140px; }

      .sub-grid-8 { grid-template-columns: 1fr 1fr; }

      .sub-row-card .img-wrap img,
      .sub-row-card .no-image { height: 90px; }

      .sub-row-card a.headline { font-size: 0.82em; }

      .links-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <h1>HEADLINE HIT</h1>
    <p class="tagline">The news, unspun.</p>
  </header>

  <div class="bar">
    <div class="bar-inner">
      <span class="bar-date" id="bar-date"></span>
      <button class="bar-submit" onclick="openSubmit()">Submit a Story</button>
    </div>
  </div>

  <!-- Submission modal -->
  <div class="submit-overlay" id="submit-overlay">
    <div class="submit-modal">
      <button class="close-btn" onclick="closeSubmit()">×</button>
      <h2>Submit a Story</h2>
      <p class="sub-desc">Found something worth sharing? Send it our way and we may feature it on Headline Hit.</p>

      <div id="submit-form-wrap">
        <div class="submit-field">
          <label>Your Name</label>
          <input type="text" id="sub-name" placeholder="First name or handle">
        </div>
        <div class="submit-field">
          <label>Email <span style="color:#999;font-weight:normal">(optional)</span></label>
          <input type="email" id="sub-email" placeholder="your@email.com">
        </div>
        <div class="submit-field">
          <label>Story URL *</label>
          <input type="url" id="sub-url" placeholder="https://...">
        </div>
        <div class="submit-field">
          <label>Why is this worth reading? <span style="color:#999;font-weight:normal">(optional)</span></label>
          <textarea id="sub-note" placeholder="Brief note..."></textarea>
        </div>
        <button class="submit-btn" id="sub-btn" onclick="submitStory()">Submit</button>
        <p id="sub-error" style="color:#cc0000;font-size:0.82em;margin-top:8px;display:none;"></p>
      </div>

      <div class="submit-success" id="submit-success">
        <div class="check">✅</div>
        <h3>Thanks for the tip!</h3>
        <p>We'll take a look and may feature it on the site.</p>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="main-columns">

      <!-- LEFT: Top Stories -->
      <div class="top-stories-col">
        <div class="other-stories-label" style="margin-bottom:14px;">Top Stories</div>
        <div class="top-story" id="top-story"></div>
        <div class="sub-row-2" id="sub-row-2"></div>
        <div class="sub-grid-8" id="sub-grid-8"></div>
      </div>

      <!-- RIGHT: Other Stories -->
      <div class="other-stories-col" id="other-stories-col">
        <div class="other-stories-label">Around the Web</div>
        <div id="other-links"></div>
      </div>

    </div>

    <!-- Bottom overflow grid -->
    <div class="bottom-divider" id="bottom-section" style="display:none;">
      <div class="other-stories-label" style="margin-bottom:16px;">Previous Stories</div>
      <div class="links-grid" id="links-grid"></div>
      <div style="text-align:center;margin-top:24px;">
        <button id="load-more-btn" onclick="loadMore()" style="display:none;padding:10px 28px;background:#111111;color:#ffffff;border:none;font-family:Arial,sans-serif;font-size:0.9em;font-weight:bold;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:3px;">
          Load More
        </button>
      </div>
    </div>

  </div>

  <footer>
    <p>Updated throughout the day</p>
    <p id="last-updated"></p>
  </footer>

  <script>
    const WORKER = 'https://news-worker.headlinehitnews.workers.dev';
    const OTHER_COL_MAX = 10;
    const TOP_COL_MAX = 11; // 1 hero + 4 sub + 6 row
    const PAGE_SIZE = 100;  // links shown per page
    let allLinks = [];      // full dataset
    let currentPage = 0;    // how many pages loaded so far

    function getDomain(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); } catch (e) { return ''; }
    }

    function makeOverlay(url) {
      const domain = getDomain(url);
      if (!domain) return null;
      const span = document.createElement('span');
      span.className = 'source-overlay';
      span.textContent = domain;
      return span;
    }

    function makeImgWrap(url, image, alt) {
      const wrap = document.createElement('a');
      wrap.href = url; wrap.target = '_blank'; wrap.className = 'img-wrap';
      const img = document.createElement('img');
      img.src = image; img.alt = alt;
      wrap.appendChild(img);
      const overlay = makeOverlay(url);
      if (overlay) wrap.appendChild(overlay);
      return wrap;
    }

    function makeNoImage(cls) {
      const div = document.createElement('div');
      div.className = cls + ' no-image';
      div.textContent = 'No image';
      return div;
    }

    function makeHeadlineLink(url, text, cls) {
      const a = document.createElement('a');
      a.href = url; a.target = '_blank'; a.className = cls;
      a.textContent = text;
      return a;
    }

    function renderOverflowBatch(overflowLinks, startIdx, count) {
      const grid = document.getElementById('links-grid');
      const batch = overflowLinks.slice(startIdx, startIdx + count);
      batch.forEach(item => {
        const div = document.createElement('div'); div.className = 'link-item';
        const prefix = item.emoji || '&#9654;';
        const domain = getDomain(item.url);
        const a = document.createElement('a');
        a.href = item.url; a.target = '_blank';
        a.innerHTML = prefix + ' ' + item.headline + (domain ? ' <span class="inline-source">- ' + domain + '</span>' : '');
        div.appendChild(a);
        grid.appendChild(div);
      });
      return batch.length;
    }

    function updateLoadMoreBtn(overflowLinks, loadedCount) {
      const btn = document.getElementById('load-more-btn');
      const remaining = overflowLinks.length - loadedCount;
      if (remaining > 0) {
        btn.style.display = '';
        btn.textContent = 'Load More (' + remaining + ' older stories)';
      } else {
        btn.style.display = 'none';
      }
    }

    let overflowAll = [];
    let overflowLoaded = 0;

    function loadMore() {
      const newCount = renderOverflowBatch(overflowAll, overflowLoaded, PAGE_SIZE);
      overflowLoaded += newCount;
      updateLoadMoreBtn(overflowAll, overflowLoaded);
    }

    fetch(WORKER + '/links')
      .then(r => r.json())
      .then(data => {
        document.getElementById('last-updated').textContent =
          'Last updated: ' + new Date(data.lastUpdated).toLocaleString();

        const links = data.links || [];
        allLinks = links;

        // Split by position — default to 'top' for backward compat
        const topLinks = links.filter(l => !l.position || l.position === 'top');
        const otherLinks = links.filter(l => l.position === 'other');

        // Overflow: anything beyond the fixed column slots, preserving original order
        const overflowLinks = links.filter(l => {
          if (!l.position || l.position === 'top') {
            return topLinks.indexOf(l) >= TOP_COL_MAX;
          }
          return otherLinks.indexOf(l) >= OTHER_COL_MAX;
        });

        overflowAll = overflowLinks;

        // ── Hero (top[0]) ──
        const topDiv = document.getElementById('top-story');
        if (topLinks.length > 0) {
          const top = topLinks[0];
          if (top.image) {
            topDiv.appendChild(makeImgWrap(top.url, top.image, top.headline));
          } else {
            topDiv.appendChild(makeNoImage(''));
          }
          topDiv.appendChild(makeHeadlineLink(top.url, top.headline, 'headline'));
        }

        // ── 2-wide sub-row (top[1-2]) ──
        const subRow2 = document.getElementById('sub-row-2');
        topLinks.slice(1, 3).forEach(item => {
          const card = document.createElement('div'); card.className = 'sub-card';
          if (item.image) {
            card.appendChild(makeImgWrap(item.url, item.image, item.headline));
          } else {
            card.appendChild(makeNoImage(''));
          }
          card.appendChild(makeHeadlineLink(item.url, item.headline, 'headline'));
          subRow2.appendChild(card);
        });

        // ── 2x4 grid (top[3-10]) ──
        const subGrid8 = document.getElementById('sub-grid-8');
        topLinks.slice(3, 11).forEach(item => {
          const card = document.createElement('div'); card.className = 'sub-row-card';
          if (item.image) {
            card.appendChild(makeImgWrap(item.url, item.image, item.headline));
          } else {
            card.appendChild(makeNoImage(''));
          }
          card.appendChild(makeHeadlineLink(item.url, item.headline, 'headline'));
          subGrid8.appendChild(card);
        });

        // ── Other Stories column (other[0-9]) ──
        const otherEl = document.getElementById('other-links');
        otherLinks.slice(0, OTHER_COL_MAX).forEach(item => {
          const div = document.createElement('div'); div.className = 'other-link-item';
          const prefix = item.emoji || '&#9654;';
          const domain = getDomain(item.url);
          const a = document.createElement('a');
          a.href = item.url; a.target = '_blank';
          a.innerHTML = prefix + ' ' + item.headline + (domain ? ' <span class="inline-source">- ' + domain + '</span>' : '');
          div.appendChild(a);
          otherEl.appendChild(div);
        });

        // ── Bottom overflow grid — first PAGE_SIZE ──
        if (overflowLinks.length > 0) {
          document.getElementById('bottom-section').style.display = '';
          overflowLoaded = renderOverflowBatch(overflowAll, 0, PAGE_SIZE);
          updateLoadMoreBtn(overflowAll, overflowLoaded);
        }
      })
      .catch(() => {
        document.getElementById('top-story').innerHTML = '<p>No links yet. Check back soon.</p>';
      });

    // ── Date in bar ──────────────────────────────────────────────
    const now = new Date();
    document.getElementById('bar-date').textContent = now.toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // ── Submission modal ─────────────────────────────────────────
    function openSubmit() {
      document.getElementById('submit-overlay').classList.add('open');
      document.getElementById('submit-form-wrap').style.display = '';
      document.getElementById('submit-success').style.display = 'none';
      document.getElementById('sub-error').style.display = 'none';
      document.getElementById('sub-btn').disabled = false;
      document.getElementById('sub-btn').textContent = 'Submit';
    }

    function closeSubmit() {
      document.getElementById('submit-overlay').classList.remove('open');
    }

    // Close on backdrop click
    document.getElementById('submit-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeSubmit();
    });

    async function submitStory() {
      const name = document.getElementById('sub-name').value.trim();
      const email = document.getElementById('sub-email').value.trim();
      const url = document.getElementById('sub-url').value.trim();
      const note = document.getElementById('sub-note').value.trim();
      const errEl = document.getElementById('sub-error');

      if (!url.startsWith('http')) {
        errEl.textContent = 'Please enter a valid URL.';
        errEl.style.display = '';
        return;
      }

      const btn = document.getElementById('sub-btn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';
      errEl.style.display = 'none';

      try {
        const res = await fetch(WORKER + '/submissions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: name || 'Anonymous',
            email,
            url,
            note,
            submittedAt: new Date().toISOString()
          })
        });
        if (!res.ok) throw new Error('Server error');
        document.getElementById('submit-form-wrap').style.display = 'none';
        document.getElementById('submit-success').style.display = 'block';
      } catch (e) {
        errEl.textContent = 'Something went wrong. Please try again.';
        errEl.style.display = '';
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    }
  </script>

</body>
</html>
